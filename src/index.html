<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Points Hospitality Autograde</title>
    <link rel="icon" type="image/png" href="/training-dashboard/favicon.png" />
    <link rel="apple-touch-icon" href="/training-dashboard/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "oklch(var(--primary) / <alpha-value>)",
              secondary: "oklch(var(--secondary) / <alpha-value>)",
              muted: "oklch(var(--muted) / <alpha-value>)",
              background: "oklch(var(--background) / <alpha-value>)",
              foreground: "oklch(var(--foreground) / <alpha-value>)",
              border: "oklch(var(--border) / <alpha-value>)",
              card: "oklch(var(--card) / <alpha-value>)",
              "card-foreground": "oklch(var(--card-foreground) / <alpha-value>)",
              "muted-foreground": "oklch(var(--muted-foreground) / <alpha-value>)",
              accent: "oklch(var(--accent) / <alpha-value>)",
              "accent-foreground": "oklch(var(--accent-foreground) / <alpha-value>)",
              input: "oklch(var(--border) / <alpha-value>)",
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Inter', 'system-ui', 'sans-serif'], 
            },
            borderRadius: {
              'xl': '0.75rem',
              '2xl': '1rem',
              '3xl': '1.5rem',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
              'glow': 'glow 3s ease-in-out infinite alternate',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              glow: {
                '0%': { opacity: '0.4' },
                '100%': { opacity: '0.8' },
              },
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

      :root {
        /* Clean Slate Blue / Cool Gray palette */
        --background: 0.98 0.005 230;
        --foreground: 0.15 0.02 230;
        
        --primary: 0.44 0.10 230; /* Slate Blue — professional, calm */
        --secondary: 0.92 0.02 230; /* Light slate tint */
        
        --muted: 0.965 0.005 230;
        --muted-foreground: 0.50 0.02 230;
        
        --border: 0.91 0.01 230;
        --card: 1 0 0;
        --card-foreground: 0.15 0.02 230;
        --accent: 0.95 0.01 230;
        --accent-foreground: 0.20 0.02 230;
      }

      body {
        background-color: oklch(var(--background));
        color: oklch(var(--foreground));
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Smooth scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: oklch(var(--border)); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: oklch(var(--muted-foreground) / 0.4); }

      /* Better focus visible */
      *:focus-visible {
        outline: 2px solid oklch(var(--primary) / 0.4);
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* Textarea placeholder styling */
      textarea::placeholder, input::placeholder {
        color: oklch(var(--muted-foreground) / 0.5);
      }

      /* Custom Utilities */
      .glass-panel {
        background: oklch(var(--card) / 0.8);
        backdrop-filter: blur(16px);
        border: 1px solid oklch(var(--border) / 0.6);
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.04), 0 1px 2px -1px rgb(0 0 0 / 0.04);
      }
      
      .clerk-badge {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.25rem;
      }

      /* Print Styles - Targeting #printable-report only */
      @media print {
        @page { margin: 1cm; size: auto; }
        
        /* Hide everything by default */
        body * {
          visibility: hidden;
        }

        /* Show specifically the report content */
        #printable-report, #printable-report * {
          visibility: visible;
        }

        /* Reposition the report to top-left to avoid blank space from previous elements */
        #printable-report {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0 !important;
          padding: 0 !important;
          box-shadow: none !important;
          border: none !important;
          background: white !important;
        }
        
        /* Ensure elements marked no-print are strictly hidden */
        .no-print, .no-print * {
          display: none !important;
        }

        /* Clean up standard tags */
        header, footer {
          display: none !important;
        }

        /* Ensure body allows content to flow */
        html, body, #root { 
          height: auto !important; 
          min-height: auto !important;
          overflow: visible !important;
          background-color: white !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>

</html>
